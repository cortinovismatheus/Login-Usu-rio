<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tela de login</title>
</head>
<body>
    <div class="container">
        <div class="model" id="loginForm">
                <h1>Login</h1>
                <p>Username</p>
                <input type="text" id="username">
                <p>Password</p>
                <input type="password" id="password">
                <button class="login-accont">Login</button>
                <span onclick="showCreate()">Criar conta</span>
        </div>
        <div class="create hidden" id="createForm">
            <h1>Create</h1>
            <p>Username</p>
            <input type="text" id="username">
            <p>Email</p>
            <input type="email" id="email">
            <p>Password</p>
            <input type="password" id="password">
            <button class="create-accont">Criar Conta</button>
            <span onclick="showLogin()">Entrar</span>

        </div>
    </div>
</body>
<script src="index.js"></script>
</html>
